    - name: Installing Homebrew Cask Packages
      homebrew_cask:
        name:
        - aerospace
        - claude-code
        - ghostty
        - pop-app
        - zoom
        - slack
        - docker
        - firefox
        - google-chrome
        - slack
        - spotify
        - visual-studio-code
        - intellij-idea
        state: present
      register: result
      until: result is successful
      when: homebrew_check.stat.exists

    - name: Installing Homebrew Packages
      homebrew:
