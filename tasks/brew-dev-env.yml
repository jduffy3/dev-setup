        - jq
        - opencode
        - sqlite
        - tree
        - tree-sitter-cli
        - prettier
        - wget
        - figlet
        - yarn
        - luarocks
        - neovim
        state: present
      register: result
      until: result is successful
      when: homebrew_check.stat.exists
